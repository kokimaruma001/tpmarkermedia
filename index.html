<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marker Media</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --gold: #c9a84c; --white: #f5f0eb; --dark: #0a0a0a; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--dark); font-family: 'Syne', sans-serif; color: var(--white); cursor: none; }
  .cursor { position: fixed; width: 10px; height: 10px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: transform 0.1s ease, width 0.3s ease, height 0.3s ease; }
  .cursor-ring { position: fixed; width: 36px; height: 36px; border: 1px solid rgba(201,168,76,0.5); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: all 0.15s ease; }
  .slides { position: fixed; inset: 0; z-index: 0; }
  .slide { position: absolute; inset: 0; background-size: cover; background-position: center; background-repeat: no-repeat; opacity: 0; transition: opacity 1.8s ease; transform: scale(1.05); }
  .slide.active { opacity: 1; animation: kenBurns 8s ease forwards; }
  @media (max-width: 768px) { .slide { background-attachment: scroll; } }
  @keyframes kenBurns { from { transform: scale(1.05); } to { transform: scale(1.0); } }
  .overlay { position: fixed; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.3) 40%, rgba(0,0,0,0.7) 100%); z-index: 1; }
  .scanlines { position: fixed; inset: 0; z-index: 2; background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); pointer-events: none; }
  .ui { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: clamp(20px, 5vw, 40px); }
  @media (max-width: 480px) { .ui { padding: 16px; } }
  .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 20; display: flex; justify-content: space-between; align-items: center; padding: 32px 48px; }
  @media (max-width: 768px) { .topbar { padding: 24px 28px; } }
  @media (max-width: 480px) { .topbar { padding: 16px 16px; } }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: clamp(0.8rem, 2vw, 1.1rem); font-weight: 300; letter-spacing: 0.35em; text-transform: uppercase; color: var(--white); opacity: 0; animation: fadeUp 1s ease 0.3s forwards; }
  .topbar-right { font-size: clamp(0.6rem, 1.5vw, 0.7rem); letter-spacing: 0.25em; text-transform: uppercase; color: rgba(245,240,235,0.5); opacity: 0; animation: fadeUp 1s ease 0.5s forwards; }
  @media (max-width: 480px) { .topbar-right { display: none; } }
  .center { display: flex; flex-direction: column; align-items: center; text-align: center; }
  .eyebrow { font-size: 0.65rem; letter-spacing: 0.5em; text-transform: uppercase; color: var(--gold); margin-bottom: 24px; opacity: 0; animation: fadeUp 1s ease 0.6s forwards; }
  .headline { font-family: 'Cormorant Garamond', serif; font-size: clamp(5rem, 12vw, 11rem); font-weight: 300; line-height: 0.88; letter-spacing: -0.01em; color: var(--white); opacity: 0; animation: fadeUp 1.2s ease 0.8s forwards; }
  .headline em { font-style: italic; color: var(--gold); }
  .divider { width: 1px; height: 60px; background: linear-gradient(to bottom, var(--gold), transparent); margin: 36px auto; opacity: 0; animation: fadeUp 1s ease 1.2s forwards; }
  .tagline { font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(245,240,235,0.6); margin-bottom: 56px; opacity: 0; animation: fadeUp 1s ease 1.4s forwards; }
  .paths { display: flex; gap: 2px; opacity: 0; animation: fadeUp 1s ease 1.6s forwards; }
  .path-card { position: relative; width: clamp(200px, 90vw, 240px); padding: clamp(24px, 5vw, 32px) clamp(20px, 4vw, 28px); border: 1px solid rgba(245,240,235,0.12); text-decoration: none; color: var(--white); overflow: hidden; cursor: none; transition: border-color 0.4s ease; backdrop-filter: blur(4px); background: rgba(10,10,10,0.3); }
  @media (max-width: 768px) { .paths { flex-wrap: wrap; justify-content: center; gap: 16px; } }
  .path-card::before { content: ''; position: absolute; inset: 0; background: var(--gold); transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.77,0,0.175,1); z-index: 0; }
  .path-card:hover::before { transform: translateY(0); }
  .path-card:hover { border-color: var(--gold); }
  .path-card:hover .card-label, .path-card:hover .card-arrow { color: var(--dark); }
  .path-card:hover .card-sub { color: rgba(10,10,10,0.7); }
  .card-inner { position: relative; z-index: 1; }
  .card-num { font-size: 0.6rem; letter-spacing: 0.3em; color: var(--gold); margin-bottom: 20px; display: block; transition: color 0.3s ease; }
  .path-card:hover .card-num { color: rgba(10,10,10,0.5); }
  .card-label { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; line-height: 1.1; margin-bottom: 12px; transition: color 0.3s ease; }
  .card-sub { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(245,240,235,0.45); line-height: 1.7; margin-bottom: 28px; transition: color 0.3s ease; }
  .card-arrow { font-size: 1.2rem; display: inline-block; transition: transform 0.3s ease, color 0.3s ease; color: var(--gold); }
  .path-card:hover .card-arrow { transform: translateX(6px); }
  .counter { position: fixed; bottom: 40px; right: 48px; z-index: 20; display: flex; align-items: center; gap: 16px; opacity: 0; animation: fadeUp 1s ease 2s forwards; }
  @media (max-width: 768px) { .counter { bottom: 20px; right: 28px; } }
  @media (max-width: 480px) { .counter { display: none; } }
  .counter-dots { display: flex; gap: 8px; }
  .dot { width: 24px; height: 1px; background: rgba(245,240,235,0.25); transition: background 0.4s ease, width 0.4s ease; cursor: pointer; }
  .dot.active { background: var(--gold); width: 40px; }
  .bottom-left { position: fixed; bottom: 40px; left: 48px; z-index: 20; font-size: clamp(0.55rem, 1.5vw, 0.65rem); letter-spacing: 0.2em; text-transform: uppercase; color: rgba(245,240,235,0.35); opacity: 0; animation: fadeUp 1s ease 2s forwards; }
  @media (max-width: 768px) { .bottom-left { bottom: 20px; left: 28px; } }
  @media (max-width: 480px) { .bottom-left { display: none; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  /* Performance & Touch Optimization */
  a, button, .path-card, [role="button"] { min-height: 44px; min-width: 44px; display: inline-flex; align-items: center; justify-content: center; }
  img { will-change: auto; }
  .slide.active { will-change: transform; }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; } }
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="slides" id="slides">
  <div class="slide active" style="background-image: url('https://lh3.googleusercontent.com/d/1NlbdZ9aoLBnW0v2R-eucllaOjblR0Mhb')"></div>
  <div class="slide" style="background-image: url('https://lh3.googleusercontent.com/d/1EgbQKHjNnyFunFJlwjIApA0qoN38QTtW')"></div>
  <div class="slide" style="background-image: url('https://lh3.googleusercontent.com/d/1xcF4lOyB1MUFGwgUvozvfbP6Tjc7IMLr')"></div>
  <div class="slide" style="background-image: url('https://lh3.googleusercontent.com/d/113tjLcSgJt0TnmBdb5ZdDhwNHsxDyL6o')"></div>
  <div class="slide" style="background-image: url('https://lh3.googleusercontent.com/d/1_3D878LXvW0G85-OsmZKBO4-hid2G3N7')"></div>
  <div class="slide" style="background-image: url('https://lh3.googleusercontent.com/d/14PHVLLukvTrgI6HbEOjQnNxZ8AUhc9-_')"></div>
</div>
<div class="overlay"></div>
<div class="scanlines"></div>
<div class="topbar">
  <div class="logo">Marker Media</div>
  <div class="topbar-right">Cape Town, South Africa</div>
</div>
<div class="ui">
  <div class="center">
    <div class="eyebrow">Visual Storytelling Studio</div>
    <h1 class="headline">Marker<br><em>Media</em></h1>
    <div class="divider"></div>
    <p class="tagline">Choose your path</p>
    <div class="paths">
      <a href="brands.html" class="path-card">
        <div class="card-inner">
          <span class="card-num">01</span>
          <div class="card-label">Brands &amp;<br>Commercial</div>
          <p class="card-sub">Product shoots. Identity.<br>Marketing content. Teams.</p>
          <span class="card-arrow">→</span>
        </div>
      </a>
      <a href="lifestyle.html" class="path-card">
        <div class="card-inner">
          <span class="card-num">02</span>
          <div class="card-label">Lifestyle &amp;<br>Personal</div>
          <p class="card-sub">Graduations. Portraits.<br>Milestones. Memories.</p>
          <span class="card-arrow">→</span>
        </div>
      </a>
    </div>
  </div>
</div>
<div class="counter"><div class="counter-dots" id="dots"></div></div>
<div class="bottom-left">Brackenfell, Cape Town &nbsp;·&nbsp; +27 82 085 3407</div>
<script>
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
    setTimeout(() => { ring.style.left = e.clientX + 'px'; ring.style.top = e.clientY + 'px'; }, 60);
  });
  document.querySelectorAll('a').forEach(el => {
    el.addEventListener('mouseenter', () => { cursor.style.width = '20px'; cursor.style.height = '20px'; });
    el.addEventListener('mouseleave', () => { cursor.style.width = '10px'; cursor.style.height = '10px'; });
  });
  const slides = document.querySelectorAll('.slide');
  const dotsContainer = document.getElementById('dots');
  let current = 0;
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.addEventListener('click', () => goTo(i));
    dotsContainer.appendChild(d);
  });
  function goTo(n) {
    slides[current].classList.remove('active');
    document.querySelectorAll('.dot')[current].classList.remove('active');
    current = n;
    slides[current].classList.add('active');
    document.querySelectorAll('.dot')[current].classList.add('active');
  }
  setInterval(() => goTo((current + 1) % slides.length), 5000);
</script>
</body>
</html>
